name: Release

# Build the card and publish/refresh the GitHub release whenever a vX.Y.Z
# tag is pushed. HACS serves the attached matrix-card.js asset.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - name: Publish release with built asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/matrix-card.js
          generate_release_notes: true
